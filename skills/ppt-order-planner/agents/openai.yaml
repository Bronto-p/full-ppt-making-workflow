display_name: PPT Order Planner
short_description: Turn a client PPT order folder into a slide-by-slide plan for sample iteration.
default_prompt: Review this PPT order folder, read the client requirement document first, verify the provided materials, and create order_materials.md plus a concise slide_plan.md. Each slide should have Content (title/subtitle/body), Template / Reference, Images, and Open Questions. Map every extracted client visual to the slide/page where it appears, to a template/reference role, or to Unclear Items. Do not generate slides yet.
