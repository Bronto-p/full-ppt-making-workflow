display_name: PPT Full Production
short_description: Generate the final image-based PPT from an approved slide plan and reference mapping.
default_prompt: Produce the final PPT from the approved slide_plan.md, approved_style_reference.md, and reference_mapping.md. Use one subagent per slide by default when subagents are available; stop if they are unavailable unless the user authorizes a single-agent run. Each slide worker must receive text content, actual bitmap reference inputs, required client image inputs, and placement images when present. Generate final slide images, QA them, record state, and assemble the PPTX.
